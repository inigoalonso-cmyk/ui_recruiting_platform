<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HappyRecruiting · Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=8" />
<script>
  // Apply saved theme before paint to avoid a flash.
  (function () {
    try {
      var t = localStorage.getItem('hr-theme');
      if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>
</head>
<body>

<div class="app">

  <!-- ---------- Icon rail (global nav) ---------- -->
  <aside class="icon-rail">
    <div class="icon-rail-top">
      <div class="brand-mark" title="HappyRecruiting Platform">
        <img src="logo.png" alt="HappyRecruiting Platform" />
      </div>
      <nav class="icon-nav">
        <button id="section-screening" class="icon-btn labeled active" type="button" title="Screening Criteria" aria-label="Screening Criteria">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M9 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/><path d="M8 11h8M8 15h5"/></svg>
          <span class="icon-label">Screening</span>
        </button>
        <button id="section-recruiters" class="icon-btn labeled" type="button" title="Recruiters" aria-label="Recruiters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="icon-label">Recruiters</span>
        </button>
        <button id="section-jobinfo" class="icon-btn labeled" type="button" title="Job Info" aria-label="Job Info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <span class="icon-label">Job Info</span>
        </button>
      </nav>
    </div>

    <div class="icon-rail-bottom">
      <button id="theme-toggle" class="icon-btn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button id="nav-settings" class="icon-btn" type="button" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="avatar-user" title="Signed in">IA</div>
    </div>
  </aside>

  <!-- ---------- Nav sidebar (folders / views) ---------- -->
  <aside class="rail">
    <div class="rail-header">
      <div class="rail-title">HappyRecruiting</div>
      <div class="rail-subtitle">Screening workspace</div>
      <button id="rail-collapse" class="rail-collapse-btn" type="button" title="Hide folders panel" aria-label="Hide folders panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
    </div>

    <div id="screening-section" class="section-panel">
      <nav class="rail-nav">
        <button id="nav-criteria" class="nav-item active" type="button">Criteria</button>
        <button id="nav-history" class="nav-item" type="button">History</button>
      </nav>

      <div id="criteria-nav">
        <button id="ashby-sync-btn" class="ashby-sync-btn" type="button" title="Pull new jobs and their info from Ashby">↻ Sync from Ashby</button>
        <div class="rail-section-label">Folders</div>
        <input id="folder-filter" class="folder-filter" type="text" placeholder="Filter folders…" autocomplete="off" aria-label="Filter folders" />
        <div id="folder-list" class="folder-list"></div>

        <form id="new-job-form" class="new-job-form">
          <input id="new-job-name" type="text" placeholder="Job title…" autocomplete="off" />
          <button type="submit">+ New folder</button>
        </form>
      </div>
    </div>

    <div id="recruiters-section" class="section-panel" style="display:none">
      <div class="rail-section-label">Folders</div>
      <input id="recruiter-folder-filter" class="folder-filter" type="text" placeholder="Filter folders…" autocomplete="off" aria-label="Filter folders" />
      <div id="recruiter-folder-list" class="folder-list"></div>

      <form id="new-recruiter-job-form" class="new-job-form">
        <input id="new-recruiter-job-name" type="text" placeholder="Job title…" autocomplete="off" />
        <button type="submit">+ New folder</button>
      </form>
    </div>

    <div id="jobinfo-section" class="section-panel" style="display:none">
      <nav class="rail-nav">
        <button id="nav-jobinfo-facts" class="nav-item active" type="button">Facts</button>
        <button id="nav-jobinfo-suggestions" class="nav-item" type="button">
          Suggested additions<span id="suggestions-badge" class="nav-badge" style="display:none">0</span>
        </button>
      </nav>

      <div id="jobinfo-facts-nav">
        <div class="rail-section-label">Folders</div>
        <input id="jobinfo-folder-filter" class="folder-filter" type="text" placeholder="Filter folders…" autocomplete="off" aria-label="Filter folders" />
        <div id="jobinfo-folder-list" class="folder-list"></div>

        <form id="new-jobinfo-form" class="new-job-form">
          <input id="new-jobinfo-name" type="text" placeholder="Job title…" autocomplete="off" />
          <button type="submit">+ New folder</button>
        </form>
      </div>
    </div>

  </aside>

  <main class="main">
    <button id="rail-expand" class="rail-expand-btn" type="button" title="Show folders panel" aria-label="Show folders panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <div id="content"></div>
  </main>

</div>

<div id="toast" class="toast"></div>

<script src="rowmenu.js?v=8"></script>
<script src="app.js?v=8"></script>
<script src="ashby-linking.js?v=8"></script>
</body>
</html>
