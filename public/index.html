<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pre-screening · Criteria Panel</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <!-- ---------- Icon rail (global nav) ---------- -->
  <aside class="icon-rail">
    <div class="icon-rail-top">
      <div class="brand-mark" title="Recruiting Platform">
        <img src="logo.png" alt="Recruiting Platform" />
      </div>
      <nav class="icon-nav">
        <button id="section-screening" class="icon-btn labeled active" type="button" title="Screening Criteria" aria-label="Screening Criteria">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M9 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/><path d="M8 11h8M8 15h5"/></svg>
          <span class="icon-label">Screening</span>
        </button>
        <button id="section-recruiters" class="icon-btn labeled" type="button" title="Recruiters" aria-label="Recruiters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="icon-label">Recruiters</span>
        </button>
      </nav>
    </div>

    <div class="icon-rail-bottom">
      <button id="nav-settings" class="icon-btn" type="button" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="avatar-user" title="Signed in">IA</div>
    </div>
  </aside>

  <!-- ---------- Nav sidebar (folders / views) ---------- -->
  <aside class="rail">
    <div class="rail-header">
      <div class="rail-title">Recruiting</div>
      <div class="rail-subtitle">Screening workspace</div>
    </div>

    <div id="screening-section" class="section-panel">
      <nav class="rail-nav">
        <button id="nav-criteria" class="nav-item active" type="button">Criteria</button>
        <button id="nav-history" class="nav-item" type="button">History</button>
      </nav>

      <div id="criteria-nav">
        <div class="rail-section-label">Folders</div>
        <div id="folder-list" class="folder-list"></div>

        <form id="new-job-form" class="new-job-form">
          <input id="new-job-name" type="text" placeholder="Job title…" autocomplete="off" />
          <button type="submit">+ New folder</button>
        </form>
      </div>
    </div>

    <div id="recruiters-section" class="section-panel" style="display:none">
      <div class="rail-section-label">Folders</div>
      <div id="recruiter-folder-list" class="folder-list"></div>

      <form id="new-recruiter-job-form" class="new-job-form">
        <input id="new-recruiter-job-name" type="text" placeholder="Job title…" autocomplete="off" />
        <button type="submit">+ New folder</button>
      </form>
    </div>
  </aside>

  <main class="main">
    <div id="content"></div>
  </main>

</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
