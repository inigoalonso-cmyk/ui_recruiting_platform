<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · HappyRecruiting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  (function () {
    try {
      var t = localStorage.getItem('hr-theme');
      if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c2024;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 10px 40px rgba(0,0,0,.08);
  }
  html[data-theme="dark"] {
    --bg: #0d0f12;
    --card: #16191d;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --border: #2a2e33;
    --shadow: 0 10px 40px rgba(0,0,0,.5);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo { width: 56px; height: 56px; object-fit: contain; margin-bottom: 18px; }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
  p { color: var(--muted); font-size: 14px; margin: 0 0 28px; line-height: 1.5; }
  .gbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .gbtn:hover { background: rgba(127,127,127,.08); }
  .foot { margin-top: 22px; font-size: 12px; color: var(--muted); }
  .err {
    margin-bottom: 20px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(220,38,38,.1);
    color: #dc2626;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="HappyRecruiting" />
    <h1>HappyRecruiting</h1>
    <p>Sign in with your <strong>HappyRobot</strong> account to continue.</p>
    <div class="err" id="err"></div>
    <a class="gbtn" href="/api/auth/login">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
      </svg>
      Sign in with Okta
    </a>
    <div class="foot">Internal tool · access restricted to HappyRobot</div>
  </div>
  <script>
    // Surface an ?error=... message if the server bounced us back here.
    var p = new URLSearchParams(location.search);
    if (p.get('error')) {
      var e = document.getElementById('err');
      e.textContent = decodeURIComponent(p.get('error'));
      e.style.display = 'block';
    }
  </script>
</body>
</html>
